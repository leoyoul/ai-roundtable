services:
  ai-roundtable:
    build: .
    image: ai-roundtable:latest
    container_name: ai-roundtable
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      AI_ROUNDTABLE_DB_PATH: /app/data/ai-roundtable.sqlite
      AI_ROUNDTABLE_SECRET: ${AI_ROUNDTABLE_SECRET:-}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
